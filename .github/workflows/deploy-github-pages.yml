# Build the Next.js UI as a static export and deploy to GitHub Pages.
# Settings → Pages → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Sync demo CSVs and CIFs into frontend public/
        run: python3 scripts/sync_static_demo_assets.py

      - name: Pages base path (project site vs user/org site)
        id: pagesbase
        run: |
          R="${{ github.event.repository.name }}"
          if [[ "$R" == *.github.io ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$R" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build static site
        working-directory: ui/frontend
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pagesbase.outputs.base_path }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
