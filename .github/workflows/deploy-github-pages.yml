# Build the Next.js static export and publish to the gh-pages branch.
# Pages source: Settings → Pages → Build and deployment → Deploy from a branch
# → Branch gh-pages, folder / (root). This avoids the GitHub Actions "artifact"
# Pages API (deploy-pages) which returns 404 for some orgs / policies.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Curated demo CSV (max 20 hull rows per MatterGen+MatterSim system)
        run: python3 scripts/export_curated_demo_candidates.py

      - name: Sync demo CSVs and CIFs into frontend public/
        run: python3 scripts/sync_static_demo_assets.py

      - name: Pages base path (project site vs user/org site)
        id: pagesbase
        run: |
          R="${{ github.event.repository.name }}"
          if [[ "$R" == *.github.io ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$R" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build static site
        working-directory: ui/frontend
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pagesbase.outputs.base_path }}
        run: |
          npm ci
          npm run build

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ui/frontend/out
          force_orphan: true
